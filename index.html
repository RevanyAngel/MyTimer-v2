<!DOCTYPE html>
<html>
    <head>
        <title>Reee Pomodoro</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Delius&family=Gaegu&family=VT323&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="style.css">
        <!-- Chart.js CDN -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>

    <body>
        <div class="main-container">
            
            <section class="distraction-card">
                <h2>Distractions</h2>
                <div class="input-group">
                    <input type="text" id="inputDistraction" placeholder="What distracted you?">
                    <button class="btn-add" onclick="addDistraction()">+</button>
                </div>
                <ul id="listDistraction" class="distraction-list draggable-container"></ul>
            </section>

            <section class="timer-wrapper">
                <div class="mode-toggle">
                    <button id="btnPomodoro" class="toggle-btn active" onclick="switchMode('pomodoro')">Pomodoro</button>
                    <button id="btnStopwatch" class="toggle-btn" onclick="switchMode('stopwatch')">Stopwatch</button>
                </div>



                <h1>Reee Pomodoro</h1>
                
                <!-- === POMODORO MODE === -->
                <div id="pomodoroMode">
                    <div class="settings-container">
                        <div class="setting-item">
                            <label>Focus (min)</label>
                            <input type="number" id="inputWorkTime" value="25" min="1">
                        </div>
                        <div class="setting-item">
                            <label>Rest (min)</label>
                            <input type="number" id="inputRestTime" value="5" min="1">
                        </div>
                        <div class="setting-item">
                            <label>Volume</label>
                            <input type="range" id="inputVolume" min="0" max="100" value="50">
                        </div>
                    </div>

                    <div id="tampilanWaktu">
                        <span id="menit">25</span>:<span id="detik">00</span>
                    </div>
                    
                    <div class="button-wrapper">
                        <button id="btnMain" onclick="actionMainButton()">Start Work</button>
                        <div class="secondary-buttons">
                            <button class="btn-small" onclick="timer_Rest()">Rest</button>
                            <button class="btn-small btn-reset" onclick="resetTimer()">Reset</button>
                        </div>
                    </div>
                </div>

                <!-- === STOPWATCH MODE === -->
                <div id="stopwatchMode" style="display: none;">
                    <div id="stopwatchDisplay">
                        <span id="swJam">00</span>:<span id="swMenit">00</span>:<span id="swDetik">00</span>
                    </div>

                    <div class="button-wrapper">
                        <button id="btnStopwatchMain" onclick="actionStopwatchButton()">Start</button>
                        <div class="secondary-buttons">
                            <button class="btn-small btn-lap" onclick="addLap()" id="btnLap">Lap</button>
                            <button class="btn-small btn-restart" onclick="restartStopwatch()">Restart</button>
                        </div>
                    </div>

                    <div class="laps-container" id="lapsContainer" style="display: none;">
                        <h3 class="laps-title">Laps</h3>
                        <ul id="lapsList" class="laps-list"></ul>
                    </div>


                </div>

                <!-- === REPORT MODE === -->
                <div id="reportMode" style="display: none;">
                    <div class="report-controls">
                        <button class="btn-filter active" onclick="filterReport('day')">Day</button>
                        <button class="btn-filter" onclick="filterReport('week')">Week</button>
                        <button class="btn-filter" onclick="filterReport('month')">Month</button>
                        <button class="btn-filter" onclick="filterReport('year')">Year</button>
                    </div>

                    <div class="chart-wrapper">
                        <canvas id="reportChart"></canvas>
                    </div>

                    <div id="reportEmptyMessage" class="report-empty" style="display: none;">
                        No history data found for this period.
                    </div>

                    <div id="reportTotalsContainer" class="report-totals-container" style="display: none;">
                        <!-- Category totals will be injected here -->
                    </div>

                    <div class="history-container" id="reportHistoryContainer" style="display: none;">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                            <h3 class="history-title" style="margin: 0;">History Details</h3>
                            <span id="dayTotalTimeDisplay" class="history-date-total" style="display: none;"></span>
                        </div>
                        <div id="reportHistoryList" class="report-history-list"></div>
                    </div>
                </div>

                <div class="history-container" id="frontHistoryContainer" style="display: none; border-top: 2px dashed var(--accent-brown); padding-top: 15px; margin-top: 15px; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <h3 class="history-title" style="margin: 0;">Today's History</h3>
                        <span id="frontTotalTimeDisplay" class="history-date-total" style="display: none;"></span>
                    </div>
                    <ul id="frontHistoryList" class="history-list"></ul>
                </div>

                <button id="btnReport" class="btn-report-main" onclick="switchMode('report')">Report</button>
            </section>

            <section class="todo-card">
                <h2>To Do List</h2>
                <div class="input-group">
                    <input type="text" id="inputTodo" placeholder="Add task...">
                    <button class="btn-add" onclick="addTodo()">+</button>
                </div>
                <ul id="listTodo" class="draggable-container"></ul>
            </section>

        </div>

        <script src="script.js"></script>
    </body>
</html>
